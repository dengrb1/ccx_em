name: Sign with SignPath
description: Uploads one artifact file to GitHub Actions, submits it to SignPath, and replaces the original with the signed file.

inputs:
  file:
    description: File path or single-file glob to sign.
    required: true
  output-directory:
    description: Directory used to download the signed artifact from SignPath.
    required: true
  artifact-name:
    description: Unique GitHub Actions artifact name used for the unsigned file upload.
    required: true
  api-token:
    description: SignPath API token.
    required: true
  organization-id:
    description: SignPath organization ID.
    required: true
  project-slug:
    description: SignPath project slug.
    required: true
  signing-policy-slug:
    description: SignPath signing policy slug.
    required: true
  artifact-configuration-slug:
    description: Optional SignPath artifact configuration slug. Empty uses the project default.
    required: false
    default: ""
  wait-for-completion-timeout-in-seconds:
    description: Maximum time to wait for the SignPath signing request.
    required: false
    default: "1800"

outputs:
  signing-request-id:
    description: SignPath signing request ID.
    value: ${{ steps.sign_with_config.outputs.signing-request-id || steps.sign_default.outputs.signing-request-id }}
  signing-request-web-url:
    description: SignPath signing request URL.
    value: ${{ steps.sign_with_config.outputs.signing-request-web-url || steps.sign_default.outputs.signing-request-web-url }}

runs:
  using: composite
  steps:
    - name: Upload unsigned artifact
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.file }}
        archive: false
        if-no-files-found: error
        overwrite: true
        retention-days: 1

    - name: Submit signing request
      if: inputs.artifact-configuration-slug != ''
      id: sign_with_config
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: ${{ inputs.api-token }}
        organization-id: ${{ inputs.organization-id }}
        project-slug: ${{ inputs.project-slug }}
        signing-policy-slug: ${{ inputs.signing-policy-slug }}
        artifact-configuration-slug: ${{ inputs.artifact-configuration-slug }}
        github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
        wait-for-completion: true
        wait-for-completion-timeout-in-seconds: ${{ inputs.wait-for-completion-timeout-in-seconds }}
        output-artifact-directory: ${{ inputs.output-directory }}
        skip-decompress: true

    - name: Submit signing request with default artifact configuration
      if: inputs.artifact-configuration-slug == ''
      id: sign_default
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: ${{ inputs.api-token }}
        organization-id: ${{ inputs.organization-id }}
        project-slug: ${{ inputs.project-slug }}
        signing-policy-slug: ${{ inputs.signing-policy-slug }}
        github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
        wait-for-completion: true
        wait-for-completion-timeout-in-seconds: ${{ inputs.wait-for-completion-timeout-in-seconds }}
        output-artifact-directory: ${{ inputs.output-directory }}
        skip-decompress: true

    - name: Replace original with signed artifact
      shell: bash
      run: |
        set -euo pipefail

        file_pattern='${{ inputs.file }}'
        output_directory='${{ inputs.output-directory }}'

        mapfile -t matches < <(compgen -G "$file_pattern")
        if [ "${#matches[@]}" -ne 1 ]; then
          echo "Expected exactly one file for '$file_pattern', got ${#matches[@]}" >&2
          exit 1
        fi

        original="${matches[0]}"
        signed_file="${output_directory}/$(basename "$original")"
        if [ ! -f "$signed_file" ]; then
          echo "Signed artifact not found: $signed_file" >&2
          find "$output_directory" -type f -print >&2 || true
          exit 1
        fi

        cp "$signed_file" "$original"
