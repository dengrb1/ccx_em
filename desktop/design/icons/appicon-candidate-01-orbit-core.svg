      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="ccx-bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(680 690) rotate(-132) scale(760 710)">
