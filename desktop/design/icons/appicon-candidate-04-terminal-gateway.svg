<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <title>CCX App Icon Candidate 04 - Terminal Gateway</title>
  <defs>
    <linearGradient id="terminal-flow" x1="216" y1="328" x2="804" y2="724" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="terminal-panel" x1="174" y1="194" x2="850" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102a56" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#06142a" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#042f2e" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="terminal-bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 704) rotate(-136) scale(770 730)">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="0.38" stop-color="#082f49"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <filter id="terminal-shadow" x="-16%" y="-16%" width="132%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="36" flood-color="#000814" flood-opacity="0.54"/>
    </filter>
    <filter id="terminal-glow" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="220" fill="url(#terminal-bg)" filter="url(#terminal-shadow)"/>
  <rect x="150" y="194" width="724" height="636" rx="148" fill="url(#terminal-panel)" stroke="#93c5fd" stroke-width="6" opacity="0.96"/>
  <path d="M190 316H834" stroke="#bae6fd" stroke-width="5" opacity="0.16"/>
  <circle cx="250" cy="256" r="23" fill="#10b981"/>
  <circle cx="318" cy="256" r="23" fill="#38bdf8" opacity="0.78"/>
  <circle cx="386" cy="256" r="23" fill="#6366f1" opacity="0.78"/>
  <path d="M198 210C316 182 720 184 826 226" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.1"/>

  <g filter="url(#terminal-glow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M294 392L430 512L294 632" stroke="url(#terminal-flow)" stroke-width="86"/>
    <path d="M526 382L738 642" stroke="url(#terminal-flow)" stroke-width="82"/>
    <path d="M738 382L526 642" stroke="url(#terminal-flow)" stroke-width="82"/>
  </g>

  <path d="M294 392L430 512L294 632" stroke="#e0f2fe" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.28"/>
  <path d="M526 382L626 505" stroke="#e0f2fe" stroke-width="15" stroke-linecap="round" opacity="0.22"/>
  <path d="M228 756H510" stroke="#10b981" stroke-width="24" stroke-linecap="round" opacity="0.46"/>
  <path d="M556 756H684" stroke="#38bdf8" stroke-width="24" stroke-linecap="round" opacity="0.34"/>
  <circle cx="760" cy="756" r="22" fill="#5eead4"/>
  <circle cx="760" cy="756" r="54" stroke="#5eead4" stroke-width="8" opacity="0.22"/>
</svg>
