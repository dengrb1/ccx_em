<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <title>CCX App Icon Candidate 02 - Routing Nexus</title>
  <defs>
    <linearGradient id="flow-main" x1="154" y1="230" x2="880" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="flow-alt" x1="150" y1="760" x2="860" y2="250" gradientUnits="userSpaceOnUse">
