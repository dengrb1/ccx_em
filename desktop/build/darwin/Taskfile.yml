version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Creates a production build of the application
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          PRODUCTION:
            ref: .PRODUCTION
      - task: common:generate:icons
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.OUTPUT}}
    vars:
      VERSION_LDFLAGS: '-X main.Version={{.BUILD_VERSION | default "dev"}} -X main.BuildTime={{.BUILD_TIME | default "unknown"}} -X main.GitCommit={{.GIT_COMMIT | default "unknown"}}'
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s {{.VERSION_LDFLAGS}}"{{else}}-buildvcs=false -gcflags=all="-l" -ldflags="{{.VERSION_LDFLAGS}}"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: darwin
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_CFLAGS: "-mmacosx-version-min=10.15"
      CGO_LDFLAGS: "-mmacosx-version-min=10.15"
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  build:dev:
    summary: Creates a development build of the application shell
    deps:
      - task: common:ensure:frontend:dist
      - task: common:generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
      - task: common:generate:icons
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.OUTPUT}}
    vars:
      VERSION_LDFLAGS: '-X main.Version={{.BUILD_VERSION | default "dev"}} -X main.BuildTime={{.BUILD_TIME | default "unknown"}} -X main.GitCommit={{.GIT_COMMIT | default "unknown"}}'
      BUILD_FLAGS: '-buildvcs=false -gcflags=all="-l" -ldflags="{{.VERSION_LDFLAGS}}"'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: darwin
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_CFLAGS: "-mmacosx-version-min=10.15"
      CGO_LDFLAGS: "-mmacosx-version-min=10.15"
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      PRODUCTION: "false"

  build:universal:
    summary: Builds darwin universal binary (arm64 + amd64)
    deps:
      - task: build
        vars:
          ARCH: amd64
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-amd64"
      - task: build
        vars:
          ARCH: arm64
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-arm64"
    cmds:
      - lipo -create -output "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.APP_NAME}}-amd64" "{{.BIN_DIR}}/{{.APP_NAME}}-arm64"
      - rm "{{.BIN_DIR}}/{{.APP_NAME}}-amd64" "{{.BIN_DIR}}/{{.APP_NAME}}-arm64"

  package:
    summary: Packages a production build of the application into a `.app` bundle
    deps:
      - task: build
        vars:
          ARCH:
            ref: .ARCH
          PRODUCTION: "true"
          BUILD_VERSION:
            ref: .BUILD_VERSION
          BUILD_TIME:
            ref: .BUILD_TIME
          GIT_COMMIT:
            ref: .GIT_COMMIT
    cmds:
      - task: create:app:bundle
        vars:
          BUILD_VERSION:
            ref: .BUILD_VERSION
          MACOS_CODESIGN_IDENTITY:
            ref: .MACOS_CODESIGN_IDENTITY

  package:universal:
    summary: Packages darwin universal binary (arm64 + amd64)
    deps:
      - task: build:universal
    cmds:
      - task: create:app:bundle
        vars:
          BUILD_VERSION:
            ref: .BUILD_VERSION
          MACOS_CODESIGN_IDENTITY:
            ref: .MACOS_CODESIGN_IDENTITY


  create:app:bundle:
    summary: Creates an `.app` bundle
    cmds:
      - rm -rf {{.BIN_DIR}}/{{.APP_NAME}}.app
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/{MacOS,Resources}
      - cp build/darwin/icons.icns {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Resources
      - cp {{.BIN_DIR}}/{{.APP_NAME}} {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/MacOS
      - |
        CCX_GO_SRC=""
        SEARCH_DIR="."
        for i in 1 2 3 4 5 6; do
          if [ -f "$SEARCH_DIR/{{.BIN_DIR}}/ccx-go" ]; then
            CCX_GO_SRC="$SEARCH_DIR/{{.BIN_DIR}}/ccx-go"; break
          fi
          if [ -f "$SEARCH_DIR/dist/ccx-go" ]; then
            CCX_GO_SRC="$SEARCH_DIR/dist/ccx-go"; break
          fi
          SEARCH_DIR="$SEARCH_DIR/.."
        done
        if [ -n "$CCX_GO_SRC" ]; then
          cp "$CCX_GO_SRC" {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/MacOS/
        else
          echo "WARN: ccx-go not found, skipping bundled backend"
        fi
      - cp build/darwin/Info.plist {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents
      - |
        VER="{{.BUILD_VERSION | default "1.0.0"}}"
        VER="${VER#v}"
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VER" "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Info.plist"
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" "{{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Info.plist"
      - |
        APP_PATH="{{.BIN_DIR}}/{{.APP_NAME}}.app"
        IDENTITY="{{.MACOS_CODESIGN_IDENTITY | default "Developer ID Application: Wang Zhiwei (PZV79TYXCR)"}}"
        codesign --force --timestamp --options runtime --sign "$IDENTITY" "$APP_PATH/Contents/MacOS/{{.APP_NAME}}"
        if [ -f "$APP_PATH/Contents/MacOS/ccx-go" ]; then
          codesign --force --timestamp --options runtime --sign "$IDENTITY" "$APP_PATH/Contents/MacOS/ccx-go"
        fi
        codesign --force --timestamp --options runtime --sign "$IDENTITY" "$APP_PATH"
        codesign --verify --deep --strict --verbose=4 "$APP_PATH"

  package:dmg:
    summary: Packages a production build of the application into a Finder-styled DMG
    vars:
      DISPLAY_APP_NAME: '{{.DISPLAY_APP_NAME | default "CCX Desktop"}}'
      DMG_WINDOW_SIZE: '{{.DMG_WINDOW_SIZE | default "520,340"}}'
      DMG_APP_POSITION: '{{.DMG_APP_POSITION | default "120,130"}}'
      DMG_APPLICATIONS_POSITION: '{{.DMG_APPLICATIONS_POSITION | default "390,130"}}'
      DMG_APP_ICON_SIZE: '{{.DMG_APP_ICON_SIZE | default 96}}'
      DMG_APPLICATIONS_ICON_SIZE: '{{.DMG_APPLICATIONS_ICON_SIZE | default 96}}'
    deps:
      - task: package
        vars:
          ARCH:
            ref: .ARCH
          BUILD_VERSION:
            ref: .BUILD_VERSION
          BUILD_TIME:
            ref: .BUILD_TIME
          GIT_COMMIT:
            ref: .GIT_COMMIT
          MACOS_CODESIGN_IDENTITY:
            ref: .MACOS_CODESIGN_IDENTITY
    cmds:
      - task: create:dmg
        vars:
          DISPLAY_APP_NAME:
            ref: .DISPLAY_APP_NAME
          DMG_WINDOW_SIZE:
            ref: .DMG_WINDOW_SIZE
          DMG_APP_POSITION:
            ref: .DMG_APP_POSITION
          DMG_APPLICATIONS_POSITION:
            ref: .DMG_APPLICATIONS_POSITION
          DMG_APP_ICON_SIZE:
            ref: .DMG_APP_ICON_SIZE
          DMG_APPLICATIONS_ICON_SIZE:
            ref: .DMG_APPLICATIONS_ICON_SIZE
          BUILD_VERSION:
            ref: .BUILD_VERSION
          MACOS_CODESIGN_IDENTITY:
            ref: .MACOS_CODESIGN_IDENTITY
          MACOS_NOTARIZE:
            ref: .MACOS_NOTARIZE
          MACOS_NOTARY_KEYCHAIN_PROFILE:
            ref: .MACOS_NOTARY_KEYCHAIN_PROFILE
          APPLE_ID:
            ref: .APPLE_ID
          APPLE_TEAM_ID:
            ref: .APPLE_TEAM_ID
          APPLE_APP_SPECIFIC_PASSWORD:
            ref: .APPLE_APP_SPECIFIC_PASSWORD

  package:release:
    summary: Packages a production build into updater ZIP and Finder-styled DMG artifacts
    vars:
      DISPLAY_APP_NAME: '{{.DISPLAY_APP_NAME | default "CCX Desktop"}}'
      DMG_WINDOW_SIZE: '{{.DMG_WINDOW_SIZE | default "520,340"}}'
      DMG_APP_POSITION: '{{.DMG_APP_POSITION | default "120,130"}}'
      DMG_APPLICATIONS_POSITION: '{{.DMG_APPLICATIONS_POSITION | default "390,130"}}'
      DMG_APP_ICON_SIZE: '{{.DMG_APP_ICON_SIZE | default 96}}'
      DMG_APPLICATIONS_ICON_SIZE: '{{.DMG_APPLICATIONS_ICON_SIZE | default 96}}'
    deps:
      - task: package
        vars:
          ARCH:
            ref: .ARCH
          BUILD_VERSION:
            ref: .BUILD_VERSION
          BUILD_TIME:
            ref: .BUILD_TIME
          GIT_COMMIT:
            ref: .GIT_COMMIT
          MACOS_CODESIGN_IDENTITY:
            ref: .MACOS_CODESIGN_IDENTITY
    cmds:
      - task: create:update:zip
        vars:
          DISPLAY_APP_NAME:
            ref: .DISPLAY_APP_NAME
          BUILD_VERSION:
            ref: .BUILD_VERSION
          ARCH:
            ref: .ARCH
      - task: create:dmg
        vars:
          DISPLAY_APP_NAME:
            ref: .DISPLAY_APP_NAME
          DMG_WINDOW_SIZE:
            ref: .DMG_WINDOW_SIZE
          DMG_APP_POSITION:
            ref: .DMG_APP_POSITION
          DMG_APPLICATIONS_POSITION:
            ref: .DMG_APPLICATIONS_POSITION
          DMG_APP_ICON_SIZE:
            ref: .DMG_APP_ICON_SIZE
          DMG_APPLICATIONS_ICON_SIZE:
            ref: .DMG_APPLICATIONS_ICON_SIZE
          BUILD_VERSION:
            ref: .BUILD_VERSION
          MACOS_CODESIGN_IDENTITY:
            ref: .MACOS_CODESIGN_IDENTITY
          MACOS_NOTARIZE:
            ref: .MACOS_NOTARIZE
          MACOS_NOTARY_KEYCHAIN_PROFILE:
            ref: .MACOS_NOTARY_KEYCHAIN_PROFILE
          APPLE_ID:
            ref: .APPLE_ID
          APPLE_TEAM_ID:
            ref: .APPLE_TEAM_ID
          APPLE_APP_SPECIFIC_PASSWORD:
            ref: .APPLE_APP_SPECIFIC_PASSWORD

  create:update:zip:
    summary: Creates a single-top-level `.app` ZIP for the in-app updater
    vars:
      DISPLAY_APP_NAME: '{{.DISPLAY_APP_NAME | default "CCX Desktop"}}'
      VERSION: '{{.BUILD_VERSION | default "0.0.0"}}'
      ZIP_OUTPUT: '{{.BIN_DIR}}/CCX-Desktop-{{.VERSION}}-darwin-{{.ARCH | default ARCH}}.zip'
    cmds:
      - rm -f "{{.ZIP_OUTPUT}}"
      - |
        APP_PATH="{{.BIN_DIR}}/{{.APP_NAME}}.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "ERROR: app bundle not found: $APP_PATH" >&2
          exit 1
        fi
        STAGING=$(mktemp -d)
        trap 'rm -rf "$STAGING"' EXIT
        cp -R "$APP_PATH" "$STAGING/{{.DISPLAY_APP_NAME}}.app"
        codesign --verify --deep --strict --verbose=4 "$STAGING/{{.DISPLAY_APP_NAME}}.app"
        ditto -c -k --sequesterRsrc --keepParent "$STAGING/{{.DISPLAY_APP_NAME}}.app" "{{.ZIP_OUTPUT}}"

  create:dmg:
    summary: Creates a DMG with a custom Finder layout using create-dmg
    vars:
      DISPLAY_APP_NAME: '{{.DISPLAY_APP_NAME | default "CCX Desktop"}}'
      DMG_WINDOW_SIZE: '{{.DMG_WINDOW_SIZE | default "520,340"}}'
      DMG_APP_POSITION: '{{.DMG_APP_POSITION | default "120,130"}}'
      DMG_APPLICATIONS_POSITION: '{{.DMG_APPLICATIONS_POSITION | default "390,130"}}'
      DMG_APP_ICON_SIZE: '{{.DMG_APP_ICON_SIZE | default 96}}'
      VERSION: '{{.BUILD_VERSION | default "0.0.0"}}'
      DMG_OUTPUT: '{{.BIN_DIR}}/CCX-Desktop-{{.VERSION}}-darwin-{{.ARCH | default ARCH}}.dmg'
    cmds:
      - rm -rf "{{.BIN_DIR}}/{{.DISPLAY_APP_NAME}}.app"
      - rm -f "{{.DMG_OUTPUT}}"
      - mv "{{.BIN_DIR}}/{{.APP_NAME}}.app" "{{.BIN_DIR}}/{{.DISPLAY_APP_NAME}}.app" || true
      - |
        STAGING=$(mktemp -d)
        trap 'rm -rf "$STAGING"' EXIT
        cp -R "{{.BIN_DIR}}/{{.DISPLAY_APP_NAME}}.app" "$STAGING/"
        APP_X=$(echo "{{.DMG_APP_POSITION}}" | cut -d, -f1)
        APP_Y=$(echo "{{.DMG_APP_POSITION}}" | cut -d, -f2)
        LINK_X=$(echo "{{.DMG_APPLICATIONS_POSITION}}" | cut -d, -f1)
        LINK_Y=$(echo "{{.DMG_APPLICATIONS_POSITION}}" | cut -d, -f2)
        WIN_W=$(echo "{{.DMG_WINDOW_SIZE}}" | cut -d, -f1)
        WIN_H=$(echo "{{.DMG_WINDOW_SIZE}}" | cut -d, -f2)
        create-dmg \
          --volname "{{.DISPLAY_APP_NAME}}" \
          --volicon build/darwin/icons.icns \
          --background build/darwin/dmg-background.png \
          --window-pos 200 120 \
          --window-size "$WIN_W" "$WIN_H" \
          --icon-size {{.DMG_APP_ICON_SIZE}} \
          --hide-extension "{{.DISPLAY_APP_NAME}}.app" \
          --icon "{{.DISPLAY_APP_NAME}}.app" "$APP_X" "$APP_Y" \
          --app-drop-link "$LINK_X" "$LINK_Y" \
          "{{.DMG_OUTPUT}}" \
          "$STAGING/"
      - |
        DMG_PATH="{{.DMG_OUTPUT}}"
        IDENTITY="{{.MACOS_CODESIGN_IDENTITY | default "Developer ID Application: Wang Zhiwei (PZV79TYXCR)"}}"
        codesign --force --timestamp --sign "$IDENTITY" "$DMG_PATH"
        codesign --verify --verbose=4 "$DMG_PATH"
        if [ "{{.MACOS_NOTARIZE | default "false"}}" = "true" ]; then
          PROFILE="{{.MACOS_NOTARY_KEYCHAIN_PROFILE | default ""}}"
          if [ -n "$PROFILE" ]; then
            xcrun notarytool submit "$DMG_PATH" --keychain-profile "$PROFILE" --wait
          else
            APPLE_ID_VALUE="{{.APPLE_ID | default ""}}"
            APPLE_TEAM_ID_VALUE="{{.APPLE_TEAM_ID | default "PZV79TYXCR"}}"
            APPLE_PASSWORD_VALUE="{{.APPLE_APP_SPECIFIC_PASSWORD | default ""}}"
            if [ -z "$APPLE_ID_VALUE" ] || [ -z "$APPLE_PASSWORD_VALUE" ]; then
              echo "ERROR: MACOS_NOTARIZE=true requires MACOS_NOTARY_KEYCHAIN_PROFILE or APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD" >&2
              exit 1
            fi
            xcrun notarytool submit "$DMG_PATH" --apple-id "$APPLE_ID_VALUE" --team-id "$APPLE_TEAM_ID_VALUE" --password "$APPLE_PASSWORD_VALUE" --wait
          fi
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
        fi
      - rm -rf "{{.BIN_DIR}}/{{.DISPLAY_APP_NAME}}.app"

  run:
    cmds:
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/{MacOS,Resources}
      - cp build/darwin/icons.icns {{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Resources
      - cp {{.BIN_DIR}}/{{.APP_NAME}} {{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS
      - cp build/darwin/Info.dev.plist {{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Info.plist
      - codesign --force --deep --sign - {{.BIN_DIR}}/{{.APP_NAME}}.dev.app
      - '{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS/{{.APP_NAME}}'
